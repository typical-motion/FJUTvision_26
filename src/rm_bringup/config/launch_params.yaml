odom2camera:
  xyz: "\"0.10 0.0  0.08\""
  rpy: "\"0.0  0.03  0.0\""

# 设置启动参数
# 命名空间 所有节点、话题都会以这个命名空间开头，如/some_namespace/image_raw
namespace: ''
# true: 读取视频 false: 读取相机
video_play: false
# 相机类型选择 daheng: 大恒相机 hikvision: 海康相机
camera_type: 'hikvision'
# true: 虚拟下位机 false: 实车 
virtual_serial: false 
# true: 英雄解算 false: 传统解算
hero_solver: false
# true: 开启打符 false：关闭打符
rune: false
# true: 启动导航tf false：不启动导航tf
navigation: false
# true: 开启全向感知 false: 关闭全向感知
omniperception: false